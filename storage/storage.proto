syntax = "proto3";

package storage;

// Định nghĩa package cho Go
option go_package = "./storage";

// Dịch vụ lưu trữ gRPC liên thông
service PoliceStorageService {
    rpc PutCase (CaseRequest) returns (CaseResponse);
    rpc GetCase (CaseRequest) returns (CaseResponse); // Đã đồng bộ dùng chung CaseRequest/Response cho gọn
}

// Cấu trúc dữ liệu truyền nhận
message CaseRequest {
    string case_id = 1;
    string case_data_json = 2;
}

message CaseResponse {
    bool success = 1;
    string message = 2;
    string case_data_json = 3; // Chứa dữ liệu trả về khi gọi hàm Get
}